[skill]
name = "aim:create_style"
description = "🎨 Интерактивный мастер создания кастомного стиля карусели. Задаёт вопросы о настроении, цветах, шрифте и подаче контента — в итоге генерирует CSS и JSON-конфиг для использования в aim_render_premium_carousel."

[prompt]
template = """
Запусти интерактивный мастер создания стиля карусели.

Вызови инструмент aim_create_style без параметров (или с step=1).
После каждого шага отображай пользователю варианты в виде нумерованного списка.
Жди выбора, затем передавай ответ в следующий шаг.

На финальном шаге (step=5) выведи:
- Название созданного стиля
- Краткое резюме настроек
- Путь к сохранённому JSON файлу
- Готовую команду для рендера карусели с этим стилем

Пользовательский запрос: {{user_request}}
"""
