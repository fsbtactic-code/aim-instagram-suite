description = "🎨 Настроить бренд-цвета для темы карусели (WCAG AA проверка)"

prompt = """
Используй инструмент aim_auto_brand_colors для настройки цветов темы.

Входные данные: {{args}}

Обязательные параметры:
- baseTheme — номер базовой темы (1-8)
- primaryColor — основной цвет в формате HEX (например: #E91E63)
- secondaryColor — вторичный цвет в формате HEX (например: #FF9800)

Опционально:
- textColor — цвет текста в HEX (по умолчанию: #FFFFFF)

Инструмент проверяет контрастность по стандарту WCAG AA и возвращает готовый CSS для передачи в /aim:render_carousel через параметр brandColorOverlay.

После получения CSS — предложи сразу отрендерить карусель командой /aim:render_carousel.
"""
