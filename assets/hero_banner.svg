<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#0f0a1a"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#e0e0ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>
  
  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#accent)" opacity="0.8"/>
  
  <!-- Glow orbs -->
  <circle cx="200" cy="200" r="200" fill="#6366f1" opacity="0.04" filter="url(#softGlow)"/>
  <circle cx="1000" cy="300" r="250" fill="#a855f7" opacity="0.03" filter="url(#softGlow)"/>
  <circle cx="600" cy="100" r="150" fill="#ec4899" opacity="0.02" filter="url(#softGlow)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.03" stroke="#ffffff" stroke-width="0.5">
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
  </g>
  
  <!-- AIM Logo text -->
  <text x="600" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="82" font-weight="900" letter-spacing="-3" fill="url(#textGrad)">AIM</text>
  
  <!-- Subtitle -->
  <text x="600" y="195" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" letter-spacing="8" fill="#a78bfa" opacity="0.7" text-transform="uppercase">INSTAGRAM SUITE</text>
  
  <!-- Tagline -->
  <text x="600" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#ffffff" opacity="0.5">Ваш личный SMM-агент внутри Claude и Cursor</text>
  
  <!-- Feature pills -->
  <g transform="translate(600, 310)">
    <!-- Pill 1 -->
    <rect x="-380" y="-16" width="160" height="32" rx="16" fill="#6366f1" opacity="0.15" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
    <text x="-300" y="5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#a5b4fc" letter-spacing="1">🎬 ВИДЕО</text>
    
    <!-- Pill 2 -->
    <rect x="-150" y="-16" width="160" height="32" rx="16" fill="#a855f7" opacity="0.15" stroke="#a855f7" stroke-opacity="0.3" stroke-width="1"/>
    <text x="-70" y="5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#c084fc" letter-spacing="1">🎨 КАРУСЕЛИ</text>
    
    <!-- Pill 3 -->
    <rect x="80" y="-16" width="160" height="32" rx="16" fill="#ec4899" opacity="0.15" stroke="#ec4899" stroke-opacity="0.3" stroke-width="1"/>
    <text x="160" y="5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#f9a8d4" letter-spacing="1">🔥 АНАЛИТИКА</text>
    
    <!-- Pill 4 -->
    <rect x="310" y="-16" width="100" height="32" rx="16" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-opacity="0.3" stroke-width="1"/>
    <text x="360" y="5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6ee7b7" letter-spacing="1">🔒 100%</text>
  </g>
  
  <!-- Version badge -->
  <rect x="548" y="355" width="104" height="24" rx="12" fill="url(#accent)" opacity="0.2"/>
  <text x="600" y="372" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#c084fc" letter-spacing="2">v3.1.0</text>
  
  <!-- Accent line bottom -->
  <rect x="0" y="398" width="1200" height="2" fill="url(#accent)" opacity="0.4"/>
</svg>
