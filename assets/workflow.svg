<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 200">
  <defs>
    <linearGradient id="grad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="grad3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  
  <rect width="1000" height="200" fill="#0a0a0f" rx="16"/>
  
  <!-- Step 1 -->
  <rect x="20" y="20" width="280" height="160" rx="12" fill="url(#grad1)" stroke="#6366f1" stroke-opacity="0.2" stroke-width="1"/>
  <text x="160" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" fill="#ffffff">💬</text>
  <text x="160" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#a5b4fc" letter-spacing="1">ШАГ 1</text>
  <text x="160" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#ffffff" opacity="0.7">Напиши запрос</text>
  <text x="160" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff" opacity="0.35">«Сделай карусель про...»</text>
  <text x="160" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff" opacity="0.35">«Проанализируй Reel...»</text>
  
  <!-- Arrow 1 -->
  <path d="M 320 100 L 360 100" stroke="url(#arrow)" stroke-width="2" stroke-dasharray="6 4"/>
  <polygon points="358,95 370,100 358,105" fill="#a855f7"/>
  
  <!-- Step 2 -->
  <rect x="380" y="20" width="280" height="160" rx="12" fill="url(#grad2)" stroke="#a855f7" stroke-opacity="0.2" stroke-width="1"/>
  <text x="520" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" fill="#ffffff">🧠</text>
  <text x="520" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#c084fc" letter-spacing="1">ШАГ 2</text>
  <text x="520" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#ffffff" opacity="0.7">ИИ обрабатывает</text>
  <text x="520" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff" opacity="0.35">Whisper → Анализ → Промпт</text>
  <text x="520" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff" opacity="0.35">Всё на вашем компьютере</text>
  
  <!-- Arrow 2 -->
  <path d="M 680 100 L 720 100" stroke="url(#arrow)" stroke-width="2" stroke-dasharray="6 4"/>
  <polygon points="718,95 730,100 718,105" fill="#ec4899"/>
  
  <!-- Step 3 -->
  <rect x="740" y="20" width="240" height="160" rx="12" fill="url(#grad3)" stroke="#ec4899" stroke-opacity="0.2" stroke-width="1"/>
  <text x="860" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" fill="#ffffff">✨</text>
  <text x="860" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#f9a8d4" letter-spacing="1">РЕЗУЛЬТАТ</text>
  <text x="860" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#ffffff" opacity="0.7">Готовые PNG-слайды</text>
  <text x="860" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff" opacity="0.35">Сценарий · Карусель</text>
  <text x="860" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff" opacity="0.35">Отчёт виральности</text>
</svg>
